# CoreAuth Configuration Example
# Copy this file to config.yaml and customize for your environment.

# The issuer URL is the base URL of your OAuth server.
# This URL will appear in tokens and discovery documents.
issuer: https://auth.example.com

# Token lifetimes (optional - defaults shown)
tokens:
  access_token_lifetime: 15m     # How long access tokens are valid
  refresh_token_lifetime: 168h   # How long refresh tokens are valid (7 days)
  id_token_lifetime: 1h          # How long ID tokens are valid
  auth_code_lifetime: 10m        # How long authorization codes are valid

# Key configuration (optional)
keys:
  algorithm: RS256               # JWT signing algorithm (RS256 or ES256)
  rotation_days: 0               # Key rotation interval (0 = never)

# Feature flags (optional)
features:
  require_pkce: true                    # Require PKCE for authorization code flows
  allow_dynamic_registration: false     # Enable RFC 7591 dynamic client registration
  enable_device_flow: false             # Enable device authorization grant (RFC 8628)
  enable_jwt_access_tokens: false       # Issue JWT access tokens instead of opaque tokens

# Static client configurations
# Define OAuth clients that can authenticate with this server.
clients:
  # Example: Public SPA client (PKCE required, no secret)
  - id: spa-app
    type: public
    name: My SPA Application
    description: Single-page application with PKCE
    redirect_uris:
      - https://myapp.example.com/callback
      - http://localhost:3000/callback  # Development
    grant_types:
      - authorization_code
      - refresh_token
    response_types:
      - code
    scopes:
      - openid
      - profile
      - email

  # Example: Confidential server-side client
  - id: backend-service
    type: confidential
    name: Backend Service
    secret: ${BACKEND_CLIENT_SECRET}    # Uses environment variable
    grant_types:
      - client_credentials
    scopes:
      - api:read
      - api:write

# Database configuration (optional - uses in-memory storage if not specified)
# Uncomment and configure for persistent storage.

# SQLite example (good for development):
# database:
#   driver: sqlite
#   dsn: file:coreauth.db?cache=shared&_fk=1

# PostgreSQL example:
# database:
#   driver: postgres
#   dsn: ${DATABASE_URL}  # e.g., postgres://user:pass@localhost:5432/coreauth?sslmode=disable

# Federation configuration (optional)
# Uncomment to integrate with CoreControl SSO.
# federation:
#   enabled: true
#   corecontrol_url: https://corecontrol.example.com
#   app_id: my-application
#   client_id: ${CORECONTROL_CLIENT_ID}
#   client_secret: ${CORECONTROL_CLIENT_SECRET}
